name: Docker Build and Test

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t logger .

    # МЕНЯЕМ ТУТ: убираем букву t, оставляем только -i
    - name: Run Docker Container Test
      run: |
        mkdir -p logs
        echo "test string from CI" | docker run -i -v "$(pwd)/logs:/home/logs" logger
