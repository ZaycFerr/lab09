name: Docker Build and Test

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем код репозитория в облако
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Собираем Docker-образ (он сам скачает всё внутри по нашему Dockerfile)
    - name: Build Docker Image
      run: docker build -t logger .

    # 3. Проверяем, что контейнер запускается и работает
    - name: Run Docker Container Test
      run: |
        mkdir -p logs
        echo "test string from CI" | docker run -i -v "$(pwd)/logs:/home/logs" logger
